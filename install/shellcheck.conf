# shellcheck directives for the Archie installer.
# Usage:  shellcheck -x --rcfile=install/shellcheck.conf install/*.sh
#
# install.sh sources nothing from untrusted input and uses several deliberate
# patterns that shellcheck flags by default. We keep the rcfile minimal so real
# issues surface.

# We intentionally use [[ ]] arithmetic-style conditionals and unquoted
# expansions inside ${1#*=} flag parsing.
disable=SC2086   # word-splitting on flag value expansion (controlled)
disable=SC2155   # declare + assign on one line is fine here
disable=SC1090   # we don't source external files
