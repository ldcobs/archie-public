# Archie v3 nginx routes extracted from the broader VPS services config.

location /v3/api/sub/ {
    auth_basic off;
    proxy_pass         http://vpn-dashboard-v3:3000;
    proxy_http_version 1.1;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-Proto https;
}

location /v3/vpn-api/ {
    auth_basic off;
    proxy_pass http://vpn-api-v3:5900/vpn-api/;
}

location /v3/ {
    auth_basic off;
    rewrite ^/v3(.*)$ $1 break;
    proxy_pass         http://vpn-dashboard-v3:3000;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade $http_upgrade;
    proxy_set_header   Connection "upgrade";
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-Proto https;
    proxy_read_timeout 60s;
}
